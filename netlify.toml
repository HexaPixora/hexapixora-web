# Netlify deploy config for the web app (apps/web) in this npm/Turborepo monorepo.
# Netlify detects the workspace and installs the full tree from the repo root,
# then builds apps/web. The Next.js plugin handles SSR / ISR / middleware.
[build]
  base = "apps/web"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # NEXT_PUBLIC_* values (and the API URL) are intentionally embedded in the
  # client bundle — they're public URLs, not secrets — so tell Netlify's secret
  # scanner to skip them, or the build fails. Real secrets stay scanned.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_API_URL,NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_WS_ORIGIN,API_URL"

[[plugins]]
  package = "@netlify/plugin-nextjs"
