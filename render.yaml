# Render blueprint for the HexaPixora API (NestJS).
# Deploy: Render Dashboard → New → Blueprint → pick this repo. Render reads this
# file and creates the service. Fill the `sync: false` secrets in the dashboard.
#
# The web app (apps/web) deploys separately on Vercel — see DEPLOY.md.
services:
  - type: web
    name: hexapixora-api
    runtime: node
    plan: free
    # Install the whole workspace, generate the Prisma client, build the API.
    buildCommand: npm install && npx prisma generate --schema=packages/database/prisma/schema.prisma && npm run build --workspace=api
    # Apply the schema to the database, then boot. `db push` is idempotent and
    # only applies diffs; --accept-data-loss keeps deploys non-interactive.
    startCommand: npx prisma db push --schema=packages/database/prisma/schema.prisma --skip-generate --accept-data-loss && node apps/api/dist/main.js
    healthCheckPath: /api
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Neon (or any Postgres) connection string — paste in the dashboard.
      - key: DATABASE_URL
        sync: false
      # Auth signing secrets — Render generates strong random values.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Comma-separated browser origins allowed to call the API directly
      # (the Vercel URL, e.g. https://hexapixora.vercel.app). REST goes through
      # the Vercel /api proxy so this mainly matters for the chat websocket.
      - key: CORS_ORIGINS
        sync: false
      # Must MATCH the web app's PREVIEW_TOKEN on Vercel (draft preview).
      - key: PREVIEW_TOKEN
        sync: false
      # Support-chat AI (Groq). Optional — bot stays silent if unset.
      - key: AI_API_KEY
        sync: false
      # Transactional email (Resend). Optional.
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
