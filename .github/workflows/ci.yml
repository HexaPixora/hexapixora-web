name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The API + web type-checks import the generated Prisma client.
      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Type-check (web + api)
        run: npm run check-types

      - name: Build (web + api)
        run: npm run build
        env:
          # Build-time only; the web app talks to the API at runtime via env.
          NEXT_TELEMETRY_DISABLED: "1"

      # Lint is advisory for now: the codebase carries known warning-level
      # findings (any / exhaustive-deps / next-img) tracked in POLISH_PLAN.md.
      # It reports but does not fail the build.
      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true
